<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure HTML media Player</title>
</head>
<body>
    <h1>This page shows videos and audio files</h1>
    <h2>Videos</h2>
    <video src="1.mp3.mp4" width="300px" height="300px" controls>1st video</video>
    <video src="2.mp3.mp4" width="300px" height="300px" controls>2nd video</video>
    <video src="3.mp3.mp4" width="300px" height="300px" controls>3rd videp</video>
    <video src="4.mp3.mp4" width="300px" height="300px" controls>4th video</video>
    <video src="5.mp3.mp4" width="300px" height="300px" controls>5th video</video>
    <video src="6.mp3.mp4" width="300px" height="300px" controls>6th video</video>
    <h2>Audios</h2>
    <audio src="1 (1).mp3" controls> 1 audio</audio>
    <audio src="1 (2).mp3" controls>2 audio</audio>
    <audio src="1 (3).mp3" controls>3 audio</audio>
    <audio src="1 (4).mp3" controls>4 audio</audio>
    <audio src="1 (5).mp3" controls>5 audio</audio>
    <audio src="1 (6).mp3" controls>6 audio</audio>
</body>
</html>
